<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      cursor: default;
    }
    #canvas.drawing {
      cursor: crosshair;
    }
    #response {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: rgba(24, 24, 27, 0.92);
      padding: 20px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 520px;
      overflow-y: auto;
      z-index: 9999;
      pointer-events: none;
      display: none;
      line-height: 1.7;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #response p { margin: 0 0 0.5em 0; }
    #response p:last-child { margin-bottom: 0; }
    #response h1, #response h2, #response h3, #response h4 {
      margin: 0.8em 0 0.4em 0;
      font-weight: 600;
      color: #f4f4f5;
    }
    #response h1 { font-size: 1.3em; }
    #response h2 { font-size: 1.15em; }
    #response h3 { font-size: 1.05em; }
    #response ul, #response ol {
      margin: 0.3em 0;
      padding-left: 1.5em;
    }
    #response li { margin: 0.15em 0; }
    #response code {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 0.9em;
    }
    #response pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    #response pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.5;
    }
    #response blockquote {
      border-left: 3px solid rgba(255, 255, 255, 0.2);
      margin: 0.5em 0;
      padding: 0.2em 0 0.2em 1em;
      color: #a1a1aa;
    }
    #response table {
      border-collapse: collapse;
      margin: 0.5em 0;
      font-size: 0.9em;
    }
    #response th, #response td {
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 4px 8px;
    }
    #response th { background: rgba(255, 255, 255, 0.06); }
    #response hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 0.6em 0;
    }
    #response a { color: #60a5fa; text-decoration: none; }
    #response strong { color: #f4f4f5; }
    #response.streaming #response-content {
      white-space: pre-wrap;
      word-break: break-word;
    }
    #response.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
    #response.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }
    #response::-webkit-scrollbar {
      width: 4px;
    }
    #response::-webkit-scrollbar-track {
      background: transparent;
    }
    #response::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }
    .response-loading {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: #d4d4d8;
      font-size: 13px;
      font-weight: 500;
    }
    #response.loading .response-loading {
      display: flex;
    }
    #response-content:empty {
      display: none;
    }
    .response-spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: #60a5fa;
      animation: response-spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .response-loading-time {
      color: rgba(212, 212, 216, 0.72);
      font-variant-numeric: tabular-nums;
      margin-left: 2px;
    }
    @keyframes response-spin {
      to { transform: rotate(360deg); }
    }
    #status {
      position: fixed;
      top: 10px;
      right: 10px;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 4px;
      z-index: 9999;
      pointer-events: none;
      display: none;
    }
    #status.drawing {
      display: block;
      background: rgba(255,50,50,0.9);
      color: #fff;
    }
    .tooltip-note {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(24, 24, 27, 0.92);
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 400px;
      line-height: 1.5;
      white-space: pre-wrap;
      z-index: 9998;
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      user-select: none;
      transform: translateY(8px);
    }
    .tooltip-note.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tooltip-highlight {
      position: fixed;
      border: 2px solid rgba(251, 191, 36, 0.98);
      border-radius: 12px;
      background: rgba(251, 191, 36, 0.08);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.14) inset;
      z-index: 9997;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 0.18s ease, transform 0.18s ease;
      animation: tooltip-highlight-pulse 1.6s ease-in-out infinite;
    }
    .tooltip-highlight.visible {
      opacity: 1;
      transform: scale(1);
    }
    .tooltip-highlight-label {
      position: absolute;
      top: -12px;
      left: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(24, 24, 27, 0.92);
      color: #fef3c7;
      border: 1px solid rgba(251, 191, 36, 0.35);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    @keyframes tooltip-highlight-pulse {
      0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.14) inset, 0 0 0 0 rgba(251, 191, 36, 0.18); }
      50% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.14) inset, 0 0 0 8px rgba(251, 191, 36, 0.08); }
    }
    .tooltip-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: #3b82f6;
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .tooltip-content {
      display: flex;
      align-items: center;
    }
    .tooltip-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .tooltip-btn {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .tooltip-btn-stop {
      background: rgba(255, 255, 255, 0.08);
      color: #a1a1aa;
    }
    .tooltip-btn-stop:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .tooltip-btn-next {
      background: rgba(59, 130, 246, 0.85);
      color: #fff;
    }
    .tooltip-btn-next:hover {
      background: rgba(59, 130, 246, 1);
    }
    .tooltip-shortcut {
      font-size: 10px;
      opacity: 0.6;
      margin-left: 4px;
    }
    #preview-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(24, 24, 27, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      z-index: 10001;
      width: 560px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #preview-dialog.visible {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #preview-dialog h3 {
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .preview-label {
      color: #a1a1aa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .preview-frames {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0 10px;
      margin-bottom: 12px;
    }
    .preview-frames::-webkit-scrollbar { height: 4px; }
    .preview-frames::-webkit-scrollbar-track { background: transparent; }
    .preview-frames::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .preview-frames img {
      height: 72px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .preview-frames img:hover {
      border-color: rgba(255,255,255,0.3);
    }
    .preview-frames img.last-frame {
      border-color: rgba(59, 130, 246, 0.6);
    }
    .preview-frames img:active {
      transform: scale(0.985);
    }
    .preview-audio {
      margin-bottom: 14px;
    }
    .preview-audio audio {
      width: 100%;
      height: 36px;
      border-radius: 8px;
    }
    .preview-no-audio {
      color: #52525b;
      font-size: 12px;
      font-family: -apple-system, sans-serif;
      font-style: italic;
      margin-bottom: 14px;
    }
    .preview-mode {
      margin-bottom: 14px;
    }
    .preview-mode-switch {
      display: flex;
      gap: 8px;
    }
    .preview-mode-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 12px;
      color: #a1a1aa;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .preview-mode-btn:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }
    .preview-mode-btn.active {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(59, 130, 246, 0.12);
      color: #e4e4e7;
    }
    .preview-mode-title {
      font-size: 13px;
      font-weight: 600;
    }
    .preview-mode-desc {
      font-size: 11px;
      line-height: 1.45;
      color: inherit;
      opacity: 0.82;
      text-align: left;
    }
    #preview-input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      resize: none;
      line-height: 1.5;
    }
    #preview-input:focus { border-color: rgba(255,255,255,0.25); }
    #preview-input::placeholder { color: rgba(255,255,255,0.3); }
    .preview-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }
    .preview-buttons button {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .preview-btn-cancel { background: rgba(255,255,255,0.08); color: #a1a1aa; }
    .preview-btn-cancel:hover { background: rgba(255,255,255,0.12); }
    .preview-btn-send { background: rgba(59,130,246,0.85); color: #fff; }
    .preview-btn-send:hover { background: rgba(59,130,246,1); }
    #image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(9, 9, 11, 0.82);
      z-index: 10020;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 28px;
      box-sizing: border-box;
    }
    #image-lightbox.visible {
      display: flex;
    }
    .image-lightbox-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(94vw, 1800px);
      max-height: 92vh;
    }
    .image-lightbox-close {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .image-lightbox-close:hover {
      background: rgba(255, 255, 255, 0.12);
    }
    #image-lightbox-img {
      display: block;
      max-width: min(94vw, 1800px);
      max-height: calc(92vh - 44px);
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      background: rgba(255, 255, 255, 0.02);
    }
    #image-lightbox-caption {
      color: #d4d4d8;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="preview-dialog">
    <h3>发送预览</h3>
    <div class="preview-label">截图序列</div>
    <div class="preview-frames" id="preview-frames"></div>
    <div class="preview-label">录音</div>
    <div class="preview-audio" id="preview-audio-wrap"></div>
    <div class="preview-mode">
      <div class="preview-label">交互模式</div>
      <div class="preview-mode-switch">
        <button class="preview-mode-btn" id="preview-mode-tooltip" type="button">
          <span class="preview-mode-title">提示指导</span>
          <span class="preview-mode-desc">模型用 tooltip 引导你自己操作</span>
        </button>
        <button class="preview-mode-btn" id="preview-mode-computer" type="button">
          <span class="preview-mode-title">直接控制</span>
          <span class="preview-mode-desc">模型调用工具直接操作电脑</span>
        </button>
      </div>
    </div>
    <div class="preview-label">补充说明（可选）</div>
    <textarea id="preview-input" rows="2" placeholder="描述你想问的问题..."></textarea>
    <div class="preview-buttons">
      <button class="preview-btn-cancel" id="preview-cancel">取消</button>
      <button class="preview-btn-send" id="preview-send">发送</button>
    </div>
  </div>
  <div id="status">● 绘画中 / 录音中</div>
  <div id="response">
    <div class="response-loading" id="response-loading" aria-hidden="true">
      <span class="response-spinner"></span>
      <span>正在等待回复...</span>
      <span class="response-loading-time" id="response-loading-time">0.0s</span>
    </div>
    <div id="response-content"></div>
  </div>
  <div id="image-lightbox">
    <div class="image-lightbox-panel">
      <button class="image-lightbox-close" id="image-lightbox-close" type="button">关闭</button>
      <img id="image-lightbox-img" alt="preview enlarged">
      <div id="image-lightbox-caption"></div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const { marked } = require('marked');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const responseDiv = document.getElementById('response');
    const responseContent = document.getElementById('response-content');
    const responseLoading = document.getElementById('response-loading');
    const responseLoadingTime = document.getElementById('response-loading-time');
    const statusDiv = document.getElementById('status');

    marked.setOptions({ breaks: true, gfm: true });

    let isDrawingMode = false;
    let isMouseDown = false;
    let isPreviewShown = false;
    let currentPreviewId = 0;
    let mediaRecorder = null;
    let audioChunks = [];
    let lastX, lastY;
    let pendingAudioBlob = null;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function jitter(v, amount) {
      return v + (Math.random() - 0.5) * amount;
    }

    function log(msg) {
      ipcRenderer.send('log', `[${new Date().toLocaleTimeString()}] ${msg}`);
    }

    function pointInElement(el, x, y) {
      if (!el) return false;
      const rect = el.getBoundingClientRect();
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // --- IPC from main ---
    ipcRenderer.on('mode', (event, mode) => {
      if (mode === 'drawing') {
        isDrawingMode = true;
        canvas.classList.add('drawing');
        statusDiv.className = 'drawing';
        log('进入绘画模式');
        startRecording();
      } else if (mode === 'idle') {
        isDrawingMode = false;
        isMouseDown = false;
        canvas.classList.remove('drawing');
        statusDiv.className = '';
      }
    });

    // --- Detect Alt release to exit drawing mode ---
    document.addEventListener('keyup', async (e) => {
      if (e.key === 'Alt' && isDrawingMode) {
        isDrawingMode = false;
        isMouseDown = false;
        canvas.classList.remove('drawing');
        statusDiv.className = '';

        pendingAudioBlob = await stopRecording();

        // Wait 333ms then capture one final full-screen screenshot
        await new Promise(resolve => setTimeout(resolve, 333));
        ipcRenderer.send('capture-final-screenshot');
      }
    });

    // --- Preview dialog ---
    const previewDialog = document.getElementById('preview-dialog');
    const previewFrames = document.getElementById('preview-frames');
    const previewAudioWrap = document.getElementById('preview-audio-wrap');
    const previewInput = document.getElementById('preview-input');
    const previewModeTooltip = document.getElementById('preview-mode-tooltip');
    const previewModeComputer = document.getElementById('preview-mode-computer');
    const previewSend = document.getElementById('preview-send');
    const previewCancel = document.getElementById('preview-cancel');
    const imageLightbox = document.getElementById('image-lightbox');
    const imageLightboxImg = document.getElementById('image-lightbox-img');
    const imageLightboxCaption = document.getElementById('image-lightbox-caption');
    const imageLightboxClose = document.getElementById('image-lightbox-close');
    let previewInteractionMode = 'tooltip';

    function setPreviewInteractionMode(mode) {
      previewInteractionMode = mode === 'computer' ? 'computer' : 'tooltip';
      previewModeTooltip.classList.toggle('active', previewInteractionMode === 'tooltip');
      previewModeComputer.classList.toggle('active', previewInteractionMode === 'computer');
    }
    setPreviewInteractionMode('tooltip');

    function openImageLightbox(src, title = '') {
      if (!src) return;
      imageLightboxImg.src = src;
      imageLightboxCaption.textContent = title || '';
      imageLightbox.classList.add('visible');
    }

    function closeImageLightbox() {
      imageLightbox.classList.remove('visible');
      imageLightboxImg.removeAttribute('src');
      imageLightboxCaption.textContent = '';
    }

    function makePreviewImage(dataUrl, title) {
      const img = document.createElement('img');
      img.src = dataUrl;
      img.className = 'last-frame';
      img.title = `${title}，点击放大`;
      img.addEventListener('click', () => openImageLightbox(dataUrl, title));
      return img;
    }

    function renderPreviewFrames(frames, omniParserImageDataUrl = '') {
      previewFrames.innerHTML = '';
      frames.forEach((dataUrl) => {
        previewFrames.appendChild(makePreviewImage(dataUrl, '全屏截图'));
      });
      if (omniParserImageDataUrl) {
        previewFrames.appendChild(makePreviewImage(omniParserImageDataUrl, 'OmniParser 标注图'));
      }
      previewFrames.scrollLeft = 0;
    }

    ipcRenderer.on('show-preview', (event, payload) => {
      isPreviewShown = true;
      currentPreviewId = Number.isFinite(payload?.previewId) ? payload.previewId : 0;
      const frames = Array.isArray(payload?.frames) ? payload.frames : [];
      const omniParserImageDataUrl = typeof payload?.omniParserImageDataUrl === 'string' ? payload.omniParserImageDataUrl : '';
      setPreviewInteractionMode(payload?.interactionMode);

      renderPreviewFrames(frames, omniParserImageDataUrl);

      // Audio preview
      previewAudioWrap.innerHTML = '';
      if (pendingAudioBlob) {
        const audioUrl = URL.createObjectURL(pendingAudioBlob);
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = audioUrl;
        previewAudioWrap.appendChild(audio);
      } else {
        const noAudio = document.createElement('div');
        noAudio.className = 'preview-no-audio';
        noAudio.textContent = '无录音';
        previewAudioWrap.appendChild(noAudio);
      }

      previewInput.value = '';
      previewDialog.classList.add('visible');
      previewInput.focus();
    });

    ipcRenderer.on('preview-omniparser', (event, payload) => {
      if (!isPreviewShown) return;
      if ((Number.isFinite(payload?.previewId) ? payload.previewId : 0) !== currentPreviewId) return;
      const frames = Array.isArray(payload?.frames) ? payload.frames : [];
      const omniParserImageDataUrl = typeof payload?.omniParserImageDataUrl === 'string' ? payload.omniParserImageDataUrl : '';
      renderPreviewFrames(frames, omniParserImageDataUrl);
    });

    async function doPreviewSend() {
      const userText = previewInput.value.trim();
      closeImageLightbox();
      previewDialog.classList.remove('visible');
      isPreviewShown = false;
      currentPreviewId = 0;

      log('发送中...');
      const audioBase64 = await blobToBase64(pendingAudioBlob);
      ipcRenderer.send('confirm-send', audioBase64, userText, previewInteractionMode);
      ipcRenderer.send('drawing-done');
      pendingAudioBlob = null;

      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 150);
    }

    function doPreviewCancel() {
      closeImageLightbox();
      previewDialog.classList.remove('visible');
      isPreviewShown = false;
      currentPreviewId = 0;
      pendingAudioBlob = null;

      ipcRenderer.send('cancel-send');
      ipcRenderer.send('drawing-done');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    previewSend.addEventListener('click', doPreviewSend);
    previewCancel.addEventListener('click', doPreviewCancel);
    previewModeTooltip.addEventListener('click', () => setPreviewInteractionMode('tooltip'));
    previewModeComputer.addEventListener('click', () => setPreviewInteractionMode('computer'));
    imageLightboxClose.addEventListener('click', closeImageLightbox);
    imageLightbox.addEventListener('click', (e) => {
      if (e.target === imageLightbox) {
        closeImageLightbox();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && imageLightbox.classList.contains('visible')) {
        e.preventDefault();
        closeImageLightbox();
      }
    });

    previewInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && imageLightbox.classList.contains('visible')) {
        e.preventDefault();
        closeImageLightbox();
        return;
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doPreviewSend();
      } else if (e.key === 'Escape') {
        doPreviewCancel();
      }
    });

    // --- Audio Recording ---
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.start();
        log('录音开始');
      } catch (e) {
        log('录音失败: ' + e.message);
      }
    }

    function stopRecording() {
      return new Promise(resolve => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
          resolve(null);
          return;
        }

        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          mediaRecorder.stream.getTracks().forEach(t => t.stop());
          resolve(blob.size < 1000 ? null : blob);
        };

        mediaRecorder.stop();
      });
    }

    function blobToBase64(blob) {
      return new Promise(resolve => {
        if (!blob) { resolve(null); return; }
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
    }

    // --- Mouse drawing ---
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0 && isDrawingMode) {
        isMouseDown = true;
        lastX = e.clientX;
        lastY = e.clientY;
      }
    });

    canvas.addEventListener('mousemove', e => {
      if (isMouseDown && isDrawingMode) {
        ctx.beginPath();
        ctx.moveTo(jitter(lastX, 1.5), jitter(lastY, 1.5));
        ctx.lineTo(jitter(e.clientX, 1.5), jitter(e.clientY, 1.5));
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        lastX = e.clientX;
        lastY = e.clientY;
      }
    });

    canvas.addEventListener('mouseup', e => {
      if (e.button === 0) {
        isMouseDown = false;
      }
    });

    // --- Model response ---
    let fadeTimer = null;
    let responseRenderTimer = null;
    let lastResponseRenderAt = 0;
    let loadingStartedAt = 0;
    let loadingElapsedTimer = null;
    let streamBuffer = '';
    let ttsAudioContext = null;
    let ttsPlaybackId = 0;
    let ttsScheduledTime = 0;
    let ttsChannels = 2;
    let ttsSampleRate = 48000;
    const activeTtsSources = new Set();
    const RESPONSE_RENDER_THROTTLE_MS = 160;
    const TTS_SCHEDULE_AHEAD_SECONDS = 0.2;
    const TTS_INITIAL_AHEAD_SECONDS = 0.45;

    function ensureTtsAudioContext() {
      if (!ttsAudioContext || ttsAudioContext.state === 'closed') {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        ttsAudioContext = new AudioContextCtor();
      }
      return ttsAudioContext;
    }

    async function resumeTtsAudioContext() {
      const ctx = ensureTtsAudioContext();
      if (ctx.state === 'suspended') {
        try {
          await ctx.resume();
        } catch (error) {
          log(`TTS resume failed: ${error.message}`);
        }
      }
      return ctx;
    }

    function clearTtsSources() {
      activeTtsSources.forEach(source => {
        try { source.stop(0); } catch {}
      });
      activeTtsSources.clear();
    }

    function stopTtsPlayback() {
      clearTtsSources();
      ttsPlaybackId = 0;
      ttsScheduledTime = 0;
    }

    function pcm16Base64ToAudioBuffer(chunkBase64, sampleRate, channels) {
      const bytes = Buffer.from(chunkBase64, 'base64');
      const sampleCount = Math.floor(bytes.byteLength / 2);
      const interleaved = new Int16Array(bytes.buffer, bytes.byteOffset, sampleCount);
      const frameCount = Math.floor(interleaved.length / channels);
      const ctx = ensureTtsAudioContext();
      const audioBuffer = ctx.createBuffer(channels, frameCount, sampleRate);

      for (let channel = 0; channel < channels; channel++) {
        const channelData = audioBuffer.getChannelData(channel);
        for (let frame = 0; frame < frameCount; frame++) {
          const index = frame * channels + channel;
          channelData[frame] = interleaved[index] / 32768;
        }
      }

      return audioBuffer;
    }

    async function scheduleTtsChunk(chunkBase64) {
      if (!chunkBase64 || !ttsPlaybackId) return;

      const ctx = await resumeTtsAudioContext();
      const audioBuffer = pcm16Base64ToAudioBuffer(chunkBase64, ttsSampleRate, ttsChannels);
      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(ctx.destination);
      source.onended = () => activeTtsSources.delete(source);
      activeTtsSources.add(source);

      const startAt = Math.max(ctx.currentTime + TTS_SCHEDULE_AHEAD_SECONDS, ttsScheduledTime || 0);
      source.start(startAt);
      ttsScheduledTime = startAt + audioBuffer.duration;
    }

    function renderResponseMarkdown(text) {
      responseContent.innerHTML = marked.parse(text || '');
      responseDiv.scrollTop = responseDiv.scrollHeight;
      lastResponseRenderAt = performance.now();
    }

    function renderResponseStreamingText(text) {
      responseContent.textContent = text || '';
      responseDiv.scrollTop = responseDiv.scrollHeight;
      lastResponseRenderAt = performance.now();
    }

    function scheduleResponseRender(force = false) {
      if (force) {
        if (responseRenderTimer) {
          clearTimeout(responseRenderTimer);
          responseRenderTimer = null;
        }
        renderResponseMarkdown(streamBuffer.trim());
        return;
      }

      if (responseRenderTimer) return;

      const elapsed = performance.now() - lastResponseRenderAt;
      const delay = Math.max(0, RESPONSE_RENDER_THROTTLE_MS - elapsed);
      responseRenderTimer = setTimeout(() => {
        responseRenderTimer = null;
        renderResponseStreamingText(streamBuffer.trim());
      }, delay);
    }

    function showResponse() {
      responseDiv.classList.remove('fade-out');
      responseDiv.classList.add('visible');
    }

    function formatLoadingElapsed(ms) {
      return `${(Math.max(0, ms) / 1000).toFixed(1)}s`;
    }

    function updateLoadingElapsed() {
      if (!loadingStartedAt) {
        responseLoadingTime.textContent = '0.0s';
        return;
      }
      responseLoadingTime.textContent = formatLoadingElapsed(performance.now() - loadingStartedAt);
    }

    function startLoadingElapsed() {
      loadingStartedAt = performance.now();
      updateLoadingElapsed();
      if (loadingElapsedTimer) clearInterval(loadingElapsedTimer);
      loadingElapsedTimer = setInterval(updateLoadingElapsed, 100);
    }

    function stopLoadingElapsed() {
      if (loadingElapsedTimer) {
        clearInterval(loadingElapsedTimer);
        loadingElapsedTimer = null;
      }
      if (loadingStartedAt) {
        updateLoadingElapsed();
      }
      loadingStartedAt = 0;
    }

    function hasResponseContent() {
      return Boolean(responseContent.textContent.trim());
    }

    function setResponseLoading(isLoading) {
      responseDiv.classList.toggle('loading', isLoading);
      responseDiv.classList.toggle('streaming', isLoading);
      responseLoading.setAttribute('aria-hidden', String(!isLoading));

      if (isLoading) {
        if (!loadingStartedAt) startLoadingElapsed();
        showResponse();
      } else if (!hasResponseContent()) {
        responseDiv.classList.remove('visible', 'fade-out');
      }
    }

    function scheduleResponseFade() {
      fadeTimer = setTimeout(() => {
        responseDiv.classList.add('fade-out');
        setTimeout(() => {
          responseDiv.classList.remove('visible', 'fade-out', 'loading');
          responseLoading.setAttribute('aria-hidden', 'true');
          responseContent.textContent = '';
        }, 300);
      }, 30000);
    }

    ipcRenderer.on('model-loading', (event, isLoading) => {
      if (isLoading) {
        if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; }
        if (responseRenderTimer) { clearTimeout(responseRenderTimer); responseRenderTimer = null; }
        streamBuffer = '';
        responseContent.textContent = '';
        stopTtsPlayback();
      } else {
        stopLoadingElapsed();
      }

      setResponseLoading(isLoading);
    });

    ipcRenderer.on('model-stream', (event, text) => {
      if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; }
      showResponse();
      setResponseLoading(true);

      streamBuffer += text;
      scheduleResponseRender(false);
    });

    ipcRenderer.on('model-done', (event, cleanText) => {
      streamBuffer = cleanText;
      showResponse();
      scheduleResponseRender(true);
      setResponseLoading(false);
      scheduleResponseFade();
    });

    ipcRenderer.on('model-error', (event, message) => {
      streamBuffer = message || '请求失败，请重试。';
      showResponse();
      scheduleResponseRender(true);
      setResponseLoading(false);
      scheduleResponseFade();
    });

    ipcRenderer.on('tts-start', async (event, payload) => {
      stopTtsPlayback();
      ttsPlaybackId = payload?.id || 0;
      ttsSampleRate = payload?.sampleRate || 48000;
      ttsChannels = payload?.channels || 2;
      const ctx = await resumeTtsAudioContext();
      ttsScheduledTime = ctx.currentTime + TTS_INITIAL_AHEAD_SECONDS;
    });

    ipcRenderer.on('tts-chunk', async (event, payload) => {
      if (!payload || payload.id !== ttsPlaybackId) return;
      try {
        await scheduleTtsChunk(payload.chunkBase64);
      } catch (error) {
        log(`TTS chunk playback failed: ${error.message}`);
      }
    });

    ipcRenderer.on('tts-end', (event, payload) => {
      if (!payload || payload.id !== ttsPlaybackId) return;
    });

    ipcRenderer.on('tts-stop', () => {
      stopTtsPlayback();
    });

    ipcRenderer.on('tts-error', (event, payload) => {
      log(`TTS error: ${payload?.message || 'unknown error'}`);
    });

    // --- Tooltips & Arrows ---
    let tooltipElements = [];
    let tooltipOverlayElements = [];

    function clearTooltips() {
      tooltipElements.forEach(el => el.remove());
      tooltipElements = [];
      tooltipOverlayElements.forEach(el => el.remove());
      tooltipOverlayElements = [];
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function positionTooltipNote(note, tooltip) {
      const hasAnchor = Number.isFinite(Number(tooltip?.x)) && Number.isFinite(Number(tooltip?.y));
      if (!hasAnchor) return;

      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const margin = 16;
      const offset = 20;
      const anchorX = clamp(Number(tooltip.x), 0, viewportWidth);
      const anchorY = clamp(Number(tooltip.y), 0, viewportHeight);
      const rect = note.getBoundingClientRect();

      let left = anchorX + offset;
      let top = anchorY + offset;

      if (left + rect.width > viewportWidth - margin) {
        left = anchorX - rect.width - offset;
      }
      if (top + rect.height > viewportHeight - margin) {
        top = anchorY - rect.height - offset;
      }

      left = clamp(left, margin, Math.max(margin, viewportWidth - rect.width - margin));
      top = clamp(top, margin, Math.max(margin, viewportHeight - rect.height - margin));

      note.style.left = `${Math.round(left)}px`;
      note.style.top = `${Math.round(top)}px`;
      note.style.right = 'auto';
      note.style.bottom = 'auto';
    }

    document.addEventListener('mousemove', (e) => {
      if (isDrawingMode || isPreviewShown) return;
      const over = tooltipElements.some(el => pointInElement(el, e.clientX, e.clientY));
      if (over) {
        ipcRenderer.send('set-interactive');
      } else {
        ipcRenderer.send('set-passthrough');
      }
    });

    ipcRenderer.on('show-tooltip', (event, t) => {
      log(`收到 tooltip: step ${t.step}, text=${t.text}, x=${t.x}, y=${t.y}, elementIndex=${t.elementIndex}`);
      clearTooltips();

      if (t?.highlight && Number.isFinite(Number(t.highlight.x)) && Number.isFinite(Number(t.highlight.y)) && Number.isFinite(Number(t.highlight.width)) && Number.isFinite(Number(t.highlight.height))) {
        const box = document.createElement('div');
        box.className = 'tooltip-highlight';
        box.style.left = `${Math.round(t.highlight.x)}px`;
        box.style.top = `${Math.round(t.highlight.y)}px`;
        box.style.width = `${Math.max(1, Math.round(t.highlight.width))}px`;
        box.style.height = `${Math.max(1, Math.round(t.highlight.height))}px`;

        if (Number.isFinite(Number(t.highlight.index))) {
          const label = document.createElement('div');
          label.className = 'tooltip-highlight-label';
          label.textContent = `#${t.highlight.index}`;
          box.appendChild(label);
        }

        document.body.appendChild(box);
        tooltipOverlayElements.push(box);
        requestAnimationFrame(() => box.classList.add('visible'));
      }

      const note = document.createElement('div');
      note.className = 'tooltip-note';

      // Content wrapper with step number
      const contentWrap = document.createElement('div');
      contentWrap.className = 'tooltip-content';

      const stepBadge = document.createElement('span');
      stepBadge.className = 'tooltip-step';
      stepBadge.textContent = String(t.step);
      contentWrap.appendChild(stepBadge);

      const text = document.createElement('span');
      text.textContent = t.text;
      contentWrap.appendChild(text);
      note.appendChild(contentWrap);

      // Action buttons: Stop / Next
      const actions = document.createElement('div');
      actions.className = 'tooltip-actions';

      const stopBtn = document.createElement('button');
      stopBtn.className = 'tooltip-btn tooltip-btn-stop';
      stopBtn.textContent = 'Stop';
      stopBtn.addEventListener('click', doStopSteps);
      actions.appendChild(stopBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'tooltip-btn tooltip-btn-next';
      nextBtn.innerHTML = 'Next <span class="tooltip-shortcut">⌥→</span>';
      nextBtn.addEventListener('click', doNextStep);
      actions.appendChild(nextBtn);
      note.appendChild(actions);

      document.body.appendChild(note);
      positionTooltipNote(note, t);
      tooltipElements.push(note);

      setTimeout(() => note.classList.add('visible'), 100);
    });

    function doNextStep() {
      clearTooltips();
      ipcRenderer.send('set-passthrough');
      setTimeout(() => ipcRenderer.send('next-step'), 200);
    }

    function doStopSteps() {
      clearTooltips();
      ipcRenderer.send('stop-steps');
      ipcRenderer.send('set-passthrough');
    }

    // Option+→ shortcut for Next (via global shortcut from main process)
    ipcRenderer.on('trigger-next', () => {
      if (tooltipElements.length > 0) {
        doNextStep();
      }
    });

    // --- Control Mode ---
  </script>
</body>
</html>
